<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgePilot - AI Code Generator</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        textarea { width: 100%; height: 100px; margin-bottom: 1rem; padding: 0.5rem; }
        button { padding: 0.5rem 1rem; background: #0070f3; color: white; border: none; cursor: pointer; }
        pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; border-radius: 5px; }
        .file-block { margin-top: 2rem; border: 1px solid #ddd; padding: 1rem; }
    </style>
</head>
<body>
    <h1>ForgePilot AI</h1>
    <p>Enter a goal to generate a verified Python project.</p>
    
    <textarea id="goalInput" placeholder="e.g., Build a CLI temperature converter"></textarea>
    <button onclick="generateCode()" id="genBtn">Generate Code</button>
    
    <p id="status"></p>
    <div id="output"></div>

    <script>
        async function generateCode() {
            const goal = document.getElementById('goalInput').value;
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            const btn = document.getElementById('genBtn');

            if (!goal) return alert("Please enter a goal.");

            btn.disabled = true;
            status.innerText = "Generating and validating code (this takes 10-20 seconds)...";
            output.innerHTML = "";

            try {
                // Pointing to your local FastAPI server
                const response = await fetch("https://forgepilot-my6c.onrender.com/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ goal: goal })
                });

                const data = await response.json();

                if (response.ok) {
                    status.innerText = data.healed ? "Success (Self-Healed!)" : "Success! Code passed all tests on the first try.";
                    
                    // Render the files
                    for (const [filename, content] of Object.entries(data.files)) {
                        output.innerHTML += `
                            <div class="file-block">
                                <h3>📄 ${filename}</h3>
                                <pre><code>${content.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
                            </div>
                        `;
                    }
                } else {
                    status.innerText = "Generation failed.";
                    output.innerHTML = `<pre style="color: red;">${data.detail}</pre>`;
                }
            } catch (error) {
                status.innerText = "Error connecting to the server.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
